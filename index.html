
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Create engaging, unique websites for salsa dance studios with marketing features and scheduling tools." />

  <body>
    <div id="root"></div>
    <form name="book-trial" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="book-trial" />
      <p hidden>
        <label>Do not fill this out if you're human: <input name="bot-field" /></label>
      </p>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="experience" />
      <input type="text" name="interest" />
      <input type="text" name="preferredDay" />
      <textarea name="message"></textarea>
    </form>
    <script type="module" src="/src/main.tsx"></script>
  </body>
